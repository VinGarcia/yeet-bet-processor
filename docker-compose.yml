services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yeet
    ports:
      - '${DB_HOST_PORT:-5132}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d yeet']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      # Override .env's localhost URL: inside the network the database is the
      # `db` service on its container port 5432, not the host. (.env is for
      # host-side dev/seed/bench, which reach it via the published DB_HOST_PORT.)
      DATABASE_URL: postgres://postgres:postgres@db:5432/yeet
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
