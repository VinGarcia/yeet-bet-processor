services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yeet
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d yeet']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - config.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
